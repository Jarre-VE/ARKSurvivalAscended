<!DOCTYPE html>
<html>

<head>
    <title>ASA Wiki</title>
    <link rel="icon" type="image/x-icon" href="favicon.jpg">
    <style>
        .magisch {
            color: rgb(255, 255, 255);
            font-size: xx-large;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        body {
            margin: 0;
            font-family: cursive;
            background-color: #1e1e1e;
            color: #e6e6e6;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111111;
            border-bottom: 2px solid #2ecc71;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        ul li {
            float: left;
        }

        ul li a {
            display: block;
            color: #e6e6e6;
            text-align: center;
            padding: 16px 20px;
            text-decoration: none;
            font-size: 18px;
        }

        ul li a:hover {
            background-color: #2ecc71;
            color: black;
        }

        ul li a.active {
            background-color: #04AA6D;
        }

        .content {
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
            color: #2ecc71;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #9be7b1;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #d0d0d0;
        }

        img {
            display: block;
            margin: 20px auto;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            z-index: 999;
            background-color: rgba(0, 0, 0, 0.8);
        }

        #fullScreenGif {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Maps.html">Maps</a></li>
        <li><a href="Creatures.html">Creatures</a></li>
        <li><a href="Pictures.html">Pictures</a></li>
        <li><a class="active" href="Magic.html">Magic</a></li>
        <li style="float:right"><a href="https://ark.wiki.gg/" target="_blank">Wiki</a></li>
    </ul>
    </nav>
    <div class="popup" id="gifPopup">
    <img src="Just-Don't.gif" id="fullScreenGif">
</div>
    <div class="magisch">
        <p>Don't press the button.</p>
        <img src="rodeknop.png" id="rodeknop" style="cursor:pointer;">
    </div>
    <script>
        document.getElementById("rodeknop").onclick = function () {
            let popup = document.getElementById("gifPopup");

            popup.style.display = "block";

            setTimeout(function () {
                popup.style.display = "none";
            }, 4000); // gif is van een gif-website en code heb ik van Mathieu kunnen krijgen
        };
    </script>

    </div>
</body>

</html>
